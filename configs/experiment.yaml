# Top-level experiment configuration — Hydra entry point.
#
# Usage:
#   python scripts/run_experiment.py \
#       dataset=orbit model=gcn trainer=default \
#       features=default labels=default
#
# Optional overrides:
#   sweep=bayesian  finetuning=default

defaults:
  - dataset: orbit
  - model: gcn
  - features: default
  - labels: default
  - trainer: default
  - sweeper: null
  - finetuning: default
  - transfer: none
  - logging: wandb
  - explainer: default
  - override hydra/sweeper: optuna
  - _self_

experiment_name: default_experiment
description: "Brain connectivity GNN benchmarking run"

# Metric optimised during a sweep (passed to HydraSweep). Override on the
# CLI to match the sweeper you select, e.g. objective_metric=r2.
objective_metric: r2

# Training runner to dispatch. Override on the CLI with runner=flat_cv to use
# the legacy flat CrossValidator (no inner HPO). Default: nested (nested CV).
runner: nested

# Bin outer CV folds on a metadata column other than the regression target
# (e.g. an age-source run stratified on VWM so its folds match VWM runs).
# null = stratify on the target (default behaviour).
stratify_target: null
