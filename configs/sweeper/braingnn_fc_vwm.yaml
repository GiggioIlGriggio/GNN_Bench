# @package hydra.sweeper
# Optuna hyperparameter sweep for BrainGNN on PNC FC → VWM d-prime prediction
#
# Based on BrainGNN architecture defaults and typical GNN hyperparameter ranges.
# Focuses on model capacity, regularization, and loss weighting.
#
# Run with:
#   PYTHONPATH=$(pwd) python scripts/run_experiment.py \
#       --multirun \
#       dataset=pnc_fc \
#       model=braingnn \
#       features=connectivity_profile_fc \
#       labels=pnc_VWMdprime \
#       sweeper=braingnn_fc_vwm \
#       objective_metric=r2

sampler:
  _target_: optuna.samplers.TPESampler
  seed: 42

direction: maximize
n_trials: 100

params:
  # Optimizer hyperparameters
  trainer.lr: tag(log, interval(1e-4, 1e-2))
  trainer.weight_decay: tag(log, interval(1e-6, 1e-3))

  # Model architecture
  model.hidden_dim: choice(64, 128, 256)
  model.dropout: interval(0.1, 0.6)
  model.embedding_dim: choice(128, 256, 512)
  model.head_hidden_dim: choice(16, 32, 64)
  model.head_num_layers: choice(1, 2, 3)

  # BrainGNN-specific pooling and convolution
  model.model_params.pool_ratio: interval(0.3, 0.8)
  model.model_params.roi_embed_dim: choice(4, 8, 16, 32)

  # Auxiliary loss weights (encourage diverse node selection and consistency)
  model.model_params.unit_loss_weight: interval(0.0, 1.0)
  model.model_params.topk_loss_weight: interval(0.0, 1.0)
