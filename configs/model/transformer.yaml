# Graph Transformer model configuration
# Maps to src.configs.model_config.ModelConfig
# Backbone: src.models.backbones.transformer.GraphTransformerBackbone (TransformerConv)

name: unimodal
backbone: transformer
hidden_dim: 64
num_layers: 3
dropout: 0.1
heads: 4                      # hidden_dim must be divisible by heads (asserted in backbone)
pooling: mean                 # mean | max | add | attention
fusion: null                  # null for unimodal
jk_mode: last                 # last | cat | max
embedding_dim: 64
head_hidden_dim: 32
head_num_layers: 2
gnn_adjacency_type: weighted  # weighted | binary
