# GCN model configuration
# Maps to src.configs.model_config.ModelConfig

name: unimodal
backbone: gcn
hidden_dim: 64
num_layers: 4
dropout: 0.1
heads: 1                      # unused for GCN but required field
pooling: mean                 # mean | max | add | attention
fusion: null                  # null for unimodal
jk_mode: last                 # last | cat | max
norm: batch                   # batch | layer | none
embedding_dim: 64
head_hidden_dim: 32
head_num_layers: 2
gnn_adjacency_type: weighted  # weighted | binary
