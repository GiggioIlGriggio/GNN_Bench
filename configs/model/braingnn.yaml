# BrainGNN model configuration (Li et al. 2021)
# Maps to src.configs.model_config.ModelConfig

name: braingnn
hidden_dim: 64
num_layers: 2          # one GConv per pooling stage (fixed at 2 stages)
dropout: 0.5
pooling: mean          # global pool applied after the two TopK stages (unused by model, kept for schema)
fusion: null           # multimodal not supported; must be null
jk_mode: last          # unused by BrainGNN, kept for schema
heads: 1               # unused by BrainGNN, kept for schema
embedding_dim: 256
head_hidden_dim: 32
head_num_layers: 2
gnn_adjacency_type: weighted

model_params:
  pool_ratio: 0.5          # fraction of ROIs kept at each TopK pooling stage
  roi_embed_dim: 8         # number of communities k in the per-ROI weight net
  lambda_topk: 0.1         # weight on the per-graph topk pooling-score loss
  lambda_unit: 0.0         # weight on the unit loss (‖pool weight‖₂ − 1)²
  lambda_consist: 0.1      # weight on the per-target-bin consistency loss
  consist_n_bins: 4        # target quantile bins for the consistency loss
