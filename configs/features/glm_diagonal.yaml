# GLM diagonal feature configuration
# Each node gets a one-hot-like embedding with its GLM activation value
# on the diagonal position (similar to identity encoding but weighted
# by neural activation).
# Maps to src.configs.feature_config.FeatureConfig
#
# Usage:
#   PYTHONPATH=$(pwd) python scripts/run_experiment.py features=glm_diagonal ...

node_features:
  - glm_diagonal
edge_features:
  - weight

# node_feat_dim = glm_diagonal(num_nodes * num_contrasts)
# With 400 nodes and 1 contrast: 400
node_feat_dim: 400
edge_feat_dim: 1

# GLM settings
glm_aggregation: mean
glm_map_type: zmap
glm_contrasts:
  - contrast-2back_vs_0back
glm_normalize: false
