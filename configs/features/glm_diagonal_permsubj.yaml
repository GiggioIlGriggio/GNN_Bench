# GLM diagonal with PER-SUBJECT value permutation (value<->identity decoupling).
#
# Identical to features=glm_diagonal except the GLM activation values are
# scrambled across nodes by a FRESH permutation per subject (seeded
# deterministically from the subject id), leaving the one-hot identity support
# intact. This destroys any usable value<->node binding while keeping the
# distinctness prior. glm_normalize stays true to match the 2026-05-29 batch
# (job 360744); under per_subject each column mixes different nodes' values
# across subjects by construction — that is the intended corruption.
# Maps to src.configs.feature_config.FeatureConfig
#
# Usage:
#   PYTHONPATH=$(pwd) python scripts/run_experiment.py features=glm_diagonal_permsubj ...

node_features:
  - glm_diagonal
edge_features:
  - weight

# node_feat_dim = glm_diagonal(num_nodes * num_contrasts)
# With 400 nodes and 1 contrast: 400
node_feat_dim: 400
edge_feat_dim: 1

# GLM settings
glm_aggregation: mean
glm_map_type: zmap
glm_contrasts:
  - contrast-2back_vs_0back
glm_normalize: true

# Value<->identity decoupling
glm_value_permute: per_subject
glm_permute_seed: 0
