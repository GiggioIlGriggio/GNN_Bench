# One-hot encoded identity feature configuration
# Maps to src.configs.feature_config.FeatureConfig

node_features:
  - identity
edge_features:
  - weight
node_feat_dim: 400
edge_feat_dim: 1

# GLM activation map settings (disabled by default)
glm_aggregation: mean
glm_map_type: zmap
glm_contrasts: []
glm_normalize: false
