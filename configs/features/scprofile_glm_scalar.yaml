# SC connectivity-profile concatenated with the per-node GLM scalar value.
# Maps to src.configs.feature_config.FeatureConfig.
#
# node_features = [sc_row, glm_scalar]:
#   sc_row      -> 400-wide; each node's row in the N x N SC matrix. Columns [0:400).
#   glm_scalar  -> num_contrasts scalar GLM activation value(s) per node.
#                  Columns [400:400+num_contrasts).
# The GLM slice is z-scored per training fold by the FoldBarrier when
# glm_normalize is true (leak-free); sc_row is left untouched.
#
# Usage:
#   PYTHONPATH=$(pwd) python scripts/run_experiment.py features=scprofile_glm_scalar ...

node_features:
  - sc_row
  - glm_scalar
edge_features:
  - weight

# node_feat_dim = sc_row(400) + glm_scalar(num_contrasts).
# With 1 contrast: 400 + 1 = 401.
node_feat_dim: 401
edge_feat_dim: 1

# GLM settings (scalar value per node, z-scored per fold).
glm_aggregation: mean
glm_map_type: zmap
glm_contrasts:
  - contrast-2back_vs_0back
glm_normalize: true
